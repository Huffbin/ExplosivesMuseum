<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explosives Museum</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="overlay"></div>

    <main class="hero">

        <h1>EXPLOSIVES MUSEUM</h1>

        <p class="subtitle">
            A historical archive of engineering, technology and innovation
        </p>

        <button class="start-button" id="startButton">
            START JOURNEY
        </button>

        <section class="categories" id="categories">

            <button class="category-button" id="launchersButton">
                LAUNCHERS
            </button>

            <button class="category-button" id="bombsButton">
                BOMBS
            </button>

        </section>

        <div class="launcher-options" id="launcherOptions">

            <button class="category-button">
                MISSILE LAUNCHERS
            </button>

            <button class="category-button">
                ARTILLERY
            </button>

        </div>

    </main>

    <script src="script.js"></script>

</body>
</html>
